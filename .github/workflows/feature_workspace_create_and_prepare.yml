name: Create Feature Workspaces

on:
  workflow_dispatch:
    inputs:
      feature_branch_name:
        description: "Feature branch name (e.g., feature_new-api)"
        required: true
        type: string
      workspaces_to_be_created:
        description: "Workspaces types (comma-separated: processing,datastores,consumption)"
        required: true
        type: string
        default: "processing,datastores"

jobs:
  create-feature-workspaces:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      

      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip & requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r config/requirements.txt

      - name: Create feature workspaces
        env:
          FEATURE_BRANCH_NAME: ${{ inputs.feature_branch_name }}
          WORKSPACES_TO_CREATE: ${{ inputs.workspaces_to_be_created }}
          CONFIG_FILE: config/templates/v01/v01-template.yml
          SPN_CLIENT_ID: ${{ secrets.SPN_CLIENT_ID }}
          SPN_CLIENT_SECRET: ${{ secrets.SPN_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          GITHUB_PAT: ${{ secrets.GH_PAT }}
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          python -X utf8 config/scripts/create_feature_workspaces.py
